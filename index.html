
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PHISHING_DETECTION | Neural Defense System</title>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom": "https://esm.sh/react-dom@^19.2.4/",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
        "recharts": "https://esm.sh/recharts@^3.7.0",
        "lucide-react": "https://esm.sh/lucide-react@^0.460.0"
      }
    }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --brand-primary: #00f2ff;
        --brand-glow: rgba(0, 242, 255, 0.4);
        --danger-red: #ff003c;
        --bg-dark: #01080b;
      }

      * { 
        box-sizing: border-box; 
        cursor: crosshair; /* Restored visible crosshair cursor */
        scrollbar-width: thin;
        scrollbar-color: var(--brand-primary) transparent;
      }

      html, body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-dark);
        color: #ffffff;
        font-family: 'JetBrains Mono', monospace;
        min-height: 100vh;
        width: 100%;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }

      #root {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }

      .scanline {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to bottom, transparent 50%, rgba(0, 242, 255, 0.03) 50%);
        background-size: 100% 4px;
        z-index: 9999;
        pointer-events: none;
        animation: scanline-scroll 10s linear infinite;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at center, transparent 20%, rgba(0, 0, 0, 0.4) 100%);
        pointer-events: none;
        z-index: 9998;
      }

      @keyframes scanline-scroll {
        from { background-position: 0 0; }
        to { background-position: 0 100%; }
      }

      .cyber-text-glow {
        text-shadow: 0 0 10px var(--brand-glow), 0 0 20px var(--brand-glow);
      }

      .danger-text-glow {
        color: var(--danger-red) !important;
        text-shadow: 0 0 20px rgba(255, 0, 60, 1), 0 0 40px rgba(255, 0, 60, 0.6);
      }

      .glass-card {
        background: rgba(5, 12, 15, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 242, 255, 0.1);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
        position: relative;
      }

      @keyframes impact-flash {
        0% { opacity: 0; filter: brightness(5) blur(10px); }
        10% { opacity: 1; filter: brightness(10) blur(0px); }
        100% { opacity: 0; filter: brightness(1) blur(50px); }
      }

      @keyframes screen-shake {
        0%, 100% { transform: translate(0, 0) scale(1); }
        10% { transform: translate(-5px, 4px) scale(1.01); }
        20% { transform: translate(5px, -4px) scale(1); }
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-impact-flash { animation: impact-flash 0.6s ease-out forwards; }
      .animate-shake { animation: screen-shake 0.1s linear infinite; }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      
      .glitch-btn {
        position: relative;
        transition: 0.2s;
      }

      .glitch-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 30px var(--brand-primary);
      }
    </style>

    <script>
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                DEFAULT: '#00f2ff',
                muted: 'rgba(0, 242, 255, 0.15)',
                dim: 'rgba(0, 242, 255, 0.4)'
              },
              danger: '#ff003c'
            },
            fontFamily: {
              orbitron: ['Orbitron', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace']
            }
          }
        }
      };
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="scanline"></div>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
